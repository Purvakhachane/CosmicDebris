<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Debris | Asteroid Dodger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>☄️ SCORE</span> <span id="scoreValue">0</span></div>
            <div class="best-box"><span>🏆 BEST</span> <span id="bestValue">0</span></div>
            <button id="resetButton">🔄 RESTART</button>
        </div>
        <div class="controls-hint">
            <span>🖱️ MOUSE → move ship</span>
            <span>📱 TOUCH → slide finger</span>
            <span>💥 avoid asteroids</span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
